    <!DOCTYPE html>
    <html lang="pt-BR">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>Orçamento Major Clean</title>
        <link rel="stylesheet" href="style.css">
    </head>

    <body>
        <div class="background"></div>
        <!--Barra de navegação-->
        <header class="navbar">
            <div class="logo">
                <img src="./assets/logo.jpg" alt="Major Clean">
            </div>
        <nav class="menu">
            <a href="#">Início</a>
            <a href="#">Serviços</a>
            <a href="#">Sobre nós</a>
            <a href="#">Contato</a>
        </nav>
        <div class="telefone">
            📞 (61) 9 9890-6393

        </div>
        </header>

        <section class="hero">
                <h1>Limpeza profissional de estofados com rapidez e qualidade.  </h1>
        </section>
        
        <!--Criando o container de orçamento-->
        <div class="container-principal">
        <h1>Calculadora de Orçamentos</h1>

        <section class="passo-1">
            <div class="header-passo">
                <span class="numero-passo">1</span>
                <h2>Selecione o tipo de estofado</h2>
            </div>

            <div class="grid-estofados">
                <div class="card-item active">
                    <div class="icon-box">🛋️</div><span>Sofá</span>
                </div>
                
                <div class="card-item">
                    <div class="icon-box">🛏️</div><span>Colchão</span>
                </div>

                <div class="card-item">
                    <div class="icon-box">🚗</div><span>Banco Automotivo</span>
                </div>    
                
                <div class="card-item">
                    <div class="icon-box">🪑</div><span>Cadeira</span>
                </div>
                </div>
        </section>
        <section class="passo-2">
            <div class="header-passo">
                <span class="numero-passo">2</span>
                <h2>Quantidade de Lugares</h2>
            </div>
            
            <div class="selecao-lugares">
                <label class="btn-lugar">
                    <input type="radio" name="lugares" value="2" checked>
                    <span>2 Lugares</span>
                </label>
                <label class="btn-lugar">
                    <input type="radio" name="lugares" value="3">
                    <span>3 Lugares</span>    
                </label>  
                <label class="btn-lugar">
                    <input type="radio" name="lugares" value="5">
                    <span>5+ Lugares</span>
                </label>
            </div>
        </section>

        <section class="passo-3">
            <div class="header-passo">
                <span class="numero-passo">3</span>
                <h2>Nível de Sujeira</h2>
            </div>
            <div class="grid-checkbox-nivel">
                <label class="check-item">
                    <input type="radio" name="sujeira" value="leve" checked>
                    <span>Leve</span>   
                </label>
                <label class="check-item">
                    <input type="radio" name="sujeira" value="moderada">
                    <span>Moderada</span>
                </label>
                <label class="check-item">
                    <input type="radio" name="sujeira" value="pesada">
                    <span>Pesada</span>
                </label>    

            </div>
        </section>
        </body>
    </html>
