    <!DOCTYPE html>
    <html lang="pt-BR">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>Orçamento Major Clean</title>
        <link rel="stylesheet" href="style.css">
    </head>

    <body>
        <div class="background"></div>
        <div class="container">

        <h1>Faça aqui seu orçamento gratuito</h1>
        <div class="campo"> 
    <label class="label" for="servico">Selecione o tipo de serviço:</label>
        <select id="servico">
        <option value="sofa">Sofá</option>
        <option value="colchao">Colchão</option>
        <option value="tapete">Tapete</option>
        <option value="banco">Banco Automotivo</option>
        </select>
        </div>
        <br>

        <label for="qtd">Quantidade:</label>
        <input type="number" id="qtd" min="1"> 

        <div class="checkbox-group">
        <input type="checkbox" id="manchas">
        <label for="manchas">Possuí manchas difíceis </label>
        </div>

        <button class="btn-calcular" onclick="calcular()">Calcular Orçamento</button>
        <br>
        

        <p id="resultado"> Valor total: R$ 0</p>
        <br>
         <button id="enviarWhatsapp" class="whatsapp" onclick="enviarWhatsapp()">Enviar orçamento no WhatsApp</button>

        </div>

        <script src="script.js"></script>
            </body>
    </html>
